  </g>

  <g filter="url(#softGlow)">
    <circle cx="600" cy="450" r="132" fill="#e6c16f" opacity="0.08" stroke="#f4cf82" stroke-opacity="0.26" stroke-width="2"/>
    <circle cx="600" cy="450" r="82" fill="#e6c16f" opacity="0.12" stroke="#f4cf82" stroke-opacity="0.42" stroke-width="2"/>
