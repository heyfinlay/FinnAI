<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Efficiency Audit system visual</title>
  <desc id="desc">An abstract premium system map showing scattered business signals becoming clearer through diagnosis.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#e6c16f" stop-opacity="0.24"/>
      <stop offset="45%" stop-color="#172033" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#08090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGold" x1="16%" y1="50%" x2="84%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="48%" stop-color="#f4cf82" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="nodeGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2be"/>
      <stop offset="38%" stop-color="#e6c16f" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#e6c16f" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="32" fill="#08090b"/>
  <rect width="1200" height="900" rx="32" fill="url(#bgGlow)"/>
