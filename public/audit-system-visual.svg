    <path d="M188 238C314 186 418 204 520 366" stroke="#ffffff" opacity="0.24"/>
    <path d="M170 458C300 458 394 450 520 450" stroke="#ffffff" opacity="0.22"/>
    <path d="M210 662C326 684 424 626 520 536" stroke="#ffffff" opacity="0.24"/>
    <path d="M680 366C774 244 838 220 1000 220" stroke="url(#lineGold)" opacity="0.88"/>
    <path d="M680 450C792 450 868 450 1026 450" stroke="url(#lineGold)" opacity="0.86"/>
    <path d="M680 536C782 642 868 686 1004 686" stroke="url(#lineGold)" opacity="0.86"/>
